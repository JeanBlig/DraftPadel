<section class="card">
  <div class="card-header">
    <p class="card-label">Time</p>
    <h2>{{ title() }}</h2>
  </div>

  <div class="placeholder-grid" aria-label="Time slot placeholder">
    @for (slot of slots; track slot.id) {
      <button
        type="button"
        class="time-slot"
        [class.selected]="isSelected(slot)"
        (click)="selectSlot(slot)"
      >
        {{ slot.label }}
      </button>
    }
  </div>
</section>
