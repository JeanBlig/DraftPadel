<section class="card">
  <div class="card-header">
    <h2>{{ title() }}</h2>
  </div>

  <div class="booking-details" aria-label="Booking summary">
    <div class="booking-row">
      <span class="booking-label">Day</span>
      <span class="booking-value">Select a day</span>
    </div>
    <div class="booking-row">
      <span class="booking-label">Time</span>
      <span class="booking-value">Select a time</span>
    </div>
    <div class="booking-row">
      <span class="booking-label">Court</span>
      <span class="booking-value">Select a court</span>
    </div>
  </div>

  <button type="button" class="booking-button">Confirm Booking</button>
</section>
