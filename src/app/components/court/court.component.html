<section class="card">
  <div class="card-header">
    <h2>{{ title() }}</h2>
  </div>

  <div class="court-grid" aria-label="Court grid">
    <div class="court-tile split-court">
      <button
        type="button"
        class="court-half"
        [class.selected]="selectedSection === 'top'"
        (click)="selectSection('top')"
      >
        
      </button>
      <button
        type="button"
        class="court-half"
        [class.selected]="selectedSection === 'bottom'"
        (click)="selectSection('bottom')"
      >
        
      </button>
    </div>
    <div class="court-tile">
      <span>Comming Soon</span>
    </div>
    <div class="court-tile">
      <span>Commong Soon</span>
    </div>
    <div class="court-tile">
      <span>Comming Soon</span>
    </div>
  </div>
</section>
